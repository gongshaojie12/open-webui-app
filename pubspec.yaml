name: conduit
description: Open-source mobile client for Open-WebUI
version: 3.1.0+116
publish_to: 'none'

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.1.0
  
  # Navigation
  go_router: ^17.0.0
  
  # Network & API
  dio: ^5.9.0
  http_parser: ^4.0.2
  
  
  # Storage
  flutter_secure_storage: ^10.0.0
  hive_ce: ^2.14.0
  hive_ce_flutter: ^2.3.2
  shared_preferences: ^2.3.2
  
  # UI Components - Markdown Rendering
  markdown: ^7.3.0
  webview_flutter_plus: ^0.4.20
  socket_io_client: ^3.1.2
  yaml: ^3.1.2
  
  
  
  # Modern Animations
  flutter_animate: ^4.5.0
  
  # Platform Features
  vad: ^0.0.7+1
  speech_to_text: ^7.3.0
  record: ^6.2.0
  flutter_tts: ^4.2.5
  audio_session: ^0.2.2
  permission_handler: ^12.0.1
  image_picker: ^1.2.0
  file_picker: ^11.0.2
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.4
  
  # Utilities
  path: ^1.9.0
  uuid: ^4.5.0
  crypto: ^3.0.3
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.0
  intl: ^0.20.2

  # Icons & Theming
  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0
  wakelock_plus: ^1.4.0
  share_plus: ^12.0.0
  share_handler: ^0.0.19
  riverpod_annotation: ^4.0.0
  flutter_local_notifications: ^21.0.0
  connectivity_plus: ^7.0.0
  flutter_cache_manager: ^3.4.1
  http: ^1.5.0
  flutter_callkit_incoming: ^3.0.0
  quick_actions: 1.1.0
  flutter_svg: ^2.2.3
  html_unescape: ^2.0.0
  home_widget: ^0.9.1
  flutter_highlight: ^0.7.0
  just_audio: ^0.10.5
  adaptive_platform_ui: ^0.1.103
  flutter_tex: ^5.2.6
  gaimon: ^1.4.2
  xterm: ^4.0.0
  web_socket_channel: ^3.0.3
  cached_network_image_ce: ^4.6.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.0
  json_serializable: ^6.11.1
  flutter_native_splash: ^2.4.6
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: 0.8.1
  mocktail: ^1.0.4
  checks: ^0.3.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  # Localization
  # ARB files live in lib/l10n (configured via l10n.yaml)
  
  assets:
    - assets/icons/
    - assets/mermaid.min.js
    - assets/chartjs.min.js
    - assets/flutter_tex.js
    - assets/flutter_tex.css
    - assets/vad/

flutter_native_splash:
  # Splash background matches the light theme; `color_dark` handles dark mode.
  color: "#FFFFFF"
  color_dark: "#000000"
  # Image to display on the splash screen.
  # Reuses the app icon source so the launch screen matches the home-screen
  # icon (avoids the "two different logos flash by" effect on cold start).
  image: assets/icons/app_icon.png

  
  # Android specific settings
  android_12:
    color: "#FFFFFF"
    color_dark: "#000000"
  
  # Web specific settings
  web: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  # iOS App Store requires opaque icons. The source PNG has an alpha channel,
  # so strip it and flatten the transparent area onto white — otherwise iOS
  # composites transparency against black on the home screen.
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  # Adaptive icon for Android 8.0+ (API 26+)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  # Windows desktop icon
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  # macOS desktop icon
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  # Web favicon
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"

